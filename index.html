// Simple Python Interpreter
class Py {
    constructor() { this.v = {}; this.f = {}; this.o = []; }
    run(code) {
        this.v = {}; this.f = {}; this.o = [];
        const lines = code.split('\n');
        try {
            this.exec(lines, 0, lines.length, 0);
            return { ok: true, out: this.o };
        } catch(e) {
            return { ok: false, err: 'Error' };
        }
    }
    exec(lines, start, end, indent) {
        for(let i = start; i < end; i++) {
            const line = lines[i];
            const t = line.trim();
            const ind = line.search(/\S/);
            
            if(ind < indent && ind >= 0) break;
            if(ind > indent || !t || t[0] === '#') continue;

            if(t.startsWith('print(') && t.endsWith(')')) {
                const arg = t.slice(6, -1);
                this.o.push(String(this.ev(arg)));
            }
            else if(t.includes('=') && !t.includes('==')) {
                const eq = t.indexOf('=');
                this.v[t.slice(0, eq).trim()] = this.ev(t.slice(eq + 1).trim());
            }
            else if(t.startsWith('for ') && t.endsWith(':')) {
                const m = t.match(/for\s+(\w+)\s+in\s+(.+):/);
                if(m) {
                    let j = i + 1;
                    while(j < end && lines[j].search(/\S/) > ind) j++;
                    const it = this.ev(m[2]);
                    if(Array.isArray(it)) {
                        for(let x of it) {
                            this.v[m[1]] = x;
                            this.exec(lines, i + 1, j, ind + 4);
                        }
                    }
                    i = j - 1;
                }
            }
            else if(t.startsWith('if ') && t.endsWith(':')) {
                const cond = t.slice(3, -1);
                let j = i + 1;
                while(j < end && lines[j].search(/\S/) > ind) j++;
                
                if(this.ev(cond)) {
                    this.exec(lines, i + 1, j, ind + 4);
                }
                i = j - 1;
            }
        }
    }
    ev(e) {
        e = String(e).trim();
        if((e[0] === '"' && e[e.length-1] === '"') || (e[0] === "'" && e[e.length-1] === "'")) return e.slice(1, -1);
        if(e.startsWith('f"') || e.startsWith("f'")) {
            let r = e.slice(2, -1);
            return r.replace(/\{([^}]+)\}/g, (m, v) => this.ev(v));
        }
        if(e.startsWith('[') && e.endsWith(']')) {
            const c = e.slice(1, -1);
            return c ? c.split(',').map(x => this.ev(x.trim())) : [];
        }
        if(e.startsWith('range(')) {
            const a = e.slice(6, -1).split(',').map(x => Number(x.trim()));
            if(a.length === 1) return Array.from({length: a[0]}, (_, i) => i);
            return Array.from({length: Math.max(0, a[1] - a[0])}, (_, i) => i + a[0]);
        }
        if(e.startsWith('len(')) return this.ev(e.slice(4, -1)).length || 0;
        if(e.startsWith('sum(')) {
            const v = this.ev(e.slice(4, -1));
            return Array.isArray(v) ? v.reduce((a, b) => Number(a) + Number(b), 0) : 0;
        }
        if(this.v[e] !== undefined) return this.v[e];
        if(!isNaN(e)) return Number(e);
        try { return eval(e); } catch(x) { return e; }
    }
}

    try {
        hl.innerHTML = hljs.highlight(code.value, {language:'python'}).value;

}

code.addEventListener('scroll', () => { hl.scrollTop = code.scrollTop; hl.scrollLeft = code.scrollLeft; });

    { cmd: 'find()', desc: 'Find position of text' },
    { cmd: 'isalpha()', desc: 'Check if character is letter' },
    { cmd: 'isdigit()', desc: 'Check if character is number' }
];

document.getElementById('runBtn').addEventListener('click', () => {
    const p = new Py();
    const r = p.run(code.value);
    if(r.ok) {
        out.innerHTML = r.out.length ? r.out.map(l => `<div class="output-line">${l}</div>`).join('') : '<div style="color:#10b981">✓ Done</div>';
    } else {
        out.innerHTML = '<div style="color:#ef4444">Error running code</div>';
    }
});

document.getElementById('downloadBtn').addEventListener('click', () => {
    const a = document.createElement('a');
    a.href = 'data:text/plain;charset=utf-8,' + encodeURIComponent(code.value);
    a.download = 'code.py';
    a.click();
});

document.getElementById('clearBtn').addEventListener('click', () => {
    out.innerHTML = 'Ready';
});

document.getElementById('tplBtn').addEventListener('click', () => {
    document.getElementById('tpl').classList.add('show');
    document.getElementById('cmd').classList.remove('show');
});

document.getElementById('cmdBtn').addEventListener('click', () => {
    document.getElementById('cmd').classList.add('show');
    document.getElementById('tpl').classList.remove('show');
});

document.getElementById('tplClose').addEventListener('click', () => {
    document.getElementById('tpl').classList.remove('show');
});

document.getElementById('cmdClose').addEventListener('click', () => {
    document.getElementById('cmd').classList.remove('show');
});

// Render Templates
const tplContent = document.getElementById('tplContent');
for(const [name, data] of Object.entries(templates)) {
    const div = document.createElement('div');
    div.className = 'item';
    div.innerHTML = `<div class="item-name">${name}</div><div class="item-desc">${data.desc}</div>`;
    div.addEventListener('click', () => {
        code.value = data.code;
        updateHL();
        localStorage.setItem('code', data.code);
        document.getElementById('tpl').classList.remove('show');
    });
    tplContent.appendChild(div);
}

// Render Commands
const cmdContent = document.getElementById('cmdContent');
for(const item of commands) {
    const div = document.createElement('div');
    div.className = 'item';
    div.innerHTML = `<div class="item-name">${item.cmd}</div><div class="item-desc">${item.desc}</div>`;
    div.addEventListener('click', () => {
        const p = code.selectionStart;
        code.value = code.value.slice(0, p) + '\n' + item.cmd + '\n' + code.value.slice(p);
        updateHL();
        localStorage.setItem('code', code.value);
        document.getElementById('cmd').classList.remove('show');
    });
    cmdContent.appendChild(div);
}

code.value = localStorage.getItem('code') || 'print("Hello, World!")';
updateHL();
</script>
</body>
</html>
