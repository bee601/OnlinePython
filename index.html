<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PyCode Pro</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/atom-one-dark.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/languages/python.min.js"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:linear-gradient(135deg,#0a0e27 0%,#0f1419 100%); color:#f1f5f9; font-family:system-ui; height:100vh; overflow:hidden; }
        .container { display:flex; flex-direction:column; height:100vh; }
        .navbar { background:rgba(15,23,42,0.95); padding:0 24px; display:flex; justify-content:space-between; align-items:center; min-height:80px; border-bottom:1px solid #1f2937; flex-wrap:wrap; gap:10px; }
        .logo { font-size:24px; font-weight:700; background:linear-gradient(135deg,#3b82f6 0%,#8b5cf6 100%); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
        button { padding:10px 16px; border:1px solid rgba(255,255,255,0.1); border-radius:8px; background:rgba(255,255,255,0.08); color:#f1f5f9; cursor:pointer; font-size:12px; font-weight:600; transition:all 0.3s; }
        button:hover { background:rgba(255,255,255,0.12); }
        .btn-run { background:linear-gradient(135deg,#3b82f6 0%,#1e40af 100%); color:white; border:none; }
        .main { display:flex; flex:1; gap:12px; padding:12px; overflow:hidden; }
        .panel { display:flex; flex-direction:column; background:rgba(17,24,39,0.8); border:1px solid #1f2937; border-radius:12px; overflow:hidden; }
        .editor-panel { flex:2; }
        .output-panel { flex:1; }
        .panel-header { background:rgba(31,41,55,0.5); border-bottom:1px solid #1f2937; padding:12px 16px; font-size:11px; font-weight:700; color:#cbd5e1; text-transform:uppercase; }
        .editor-wrapper { flex:1; position:relative; overflow:hidden; }
        textarea { position:absolute; width:100%; height:100%; padding:16px; border:none; background:transparent; color:transparent; caret-color:#3b82f6; font-family:'Fira Code',monospace; font-size:14px; line-height:1.6; z-index:2; overflow:auto; resize:none; }
        .highlight-layer { position:absolute; width:100%; height:100%; padding:16px; font-family:'Fira Code',monospace; font-size:14px; line-height:1.6; white-space:pre-wrap; overflow:auto; pointer-events:none; z-index:1; }
        .hljs { background:transparent !important; }
        .hljs-string { color:#10b981; }
        .hljs-keyword { color:#f472b6; }
        .output-container { flex:1; overflow-y:auto; padding:16px; font-family:'Fira Code',monospace; font-size:13px; }
        .output-line { margin-bottom:6px; }
        .sidebar { position:fixed; left:-420px; top:0; width:420px; height:100vh; background:rgba(15,23,42,0.98); border-right:1px solid #1f2937; z-index:999; transition:left 0.3s; overflow-y:auto; padding-top:100px; }
        .sidebar.show { left:0; }
        .sidebar-header { position:fixed; top:0; left:-420px; width:420px; min-height:80px; background:rgba(15,23,42,0.98); border-bottom:1px solid #1f2937; padding:0 20px; display:flex; justify-content:space-between; align-items:center; z-index:1000; transition:left 0.3s; }
        .sidebar.show .sidebar-header { left:0; }
        .sidebar-header h3 { font-size:18px; }
        .sidebar-close { background:none; border:none; color:#cbd5e1; font-size:24px; cursor:pointer; padding:0; }
        .sidebar-content { padding:16px; }
        .item { background:rgba(31,41,55,0.5); border:1px solid #1f2937; padding:12px; margin-bottom:10px; border-radius:6px; cursor:pointer; transition:all 0.2s; }
        .item:hover { background:rgba(59,130,246,0.1); border-color:#3b82f6; transform:translateX(4px); }
        .item-name { color:#3b82f6; font-weight:600; font-size:13px; margin-bottom:4px; }
        .item-desc { color:#cbd5e1; font-size:11px; line-height:1.4; }
        .bottom-buttons { position:fixed; bottom:24px; left:24px; display:flex; gap:10px; z-index:50; }
    </style>
</head>
<body>
<div class="container">
    <div class="navbar">
        <div class="logo">🐍 PyCode Pro</div>
        <div>
            <button class="btn-run" id="runBtn">▶ Run</button>
            <button id="downloadBtn">⬇ Download</button>
            <button id="clearBtn">Clear</button>
        </div>
    </div>

    <div class="main">
        <div class="panel editor-panel">
            <div class="panel-header">Python Code</div>
            <div class="editor-wrapper">
                <div class="editor-container">
                    <div class="highlight-layer" id="hl"></div>
                    <textarea id="code" spellcheck="false"></textarea>
                </div>
            </div>
        </div>

        <div class="panel output-panel">
            <div class="panel-header">Output</div>
            <div class="output-container" id="out">Ready</div>
        </div>
    </div>
</div>

<div class="sidebar" id="tpl">
    <div class="sidebar-header">
        <h3>Templates (15+)</h3>
        <button class="sidebar-close" id="tplClose">✕</button>
    </div>
    <div class="sidebar-content" id="tplContent"></div>
</div>

<div class="sidebar" id="cmd">
    <div class="sidebar-header">
        <h3>Commands (40+)</h3>
        <button class="sidebar-close" id="cmdClose">✕</button>
    </div>
    <div class="sidebar-content" id="cmdContent"></div>
</div>

<div class="bottom-buttons">
    <button id="tplBtn">📚 Templates</button>
    <button id="cmdBtn">🔧 Commands</button>
</div>

<script>
// IMPROVED PYTHON INTERPRETER
class Py {
    constructor() { this.v = {}; this.o = []; }
    run(code) {
        this.v = {}; this.o = [];
        const lines = code.split('\n');
        try {
            this.exec(lines, 0, lines.length, 0);
            return { ok: true, out: this.o };
        } catch(e) {
            return { ok: false, err: 'Error' };
        }
    }
    exec(lines, start, end, indent) {
        for(let i = start; i < end; i++) {
            try {
                const line = lines[i];
                const t = line.trim();
                const ind = line.search(/\S/);
                
                if(ind < indent && ind >= 0) break;
                if(ind > indent || !t || t[0] === '#') continue;

                // PRINT
                if(t.startsWith('print(')) {
                    const arg = t.slice(6, -1);
                    this.o.push(String(this.ev(arg)));
                }
                // ASSIGNMENT
                else if(t.includes('=') && !t.includes('==')) {
                    const eq = t.indexOf('=');
                    const varName = t.slice(0, eq).trim();
                    const val = this.ev(t.slice(eq + 1).trim());
                    this.v[varName] = val;
                }
                // FOR LOOP
                else if(t.startsWith('for ') && t.endsWith(':')) {
                    const m = t.match(/for\s+(\w+)\s+in\s+(.+):/);
                    if(m) {
                        let j = i + 1;
                        while(j < end && lines[j].search(/\S/) > ind) j++;
                        const it = this.ev(m[2]);
                        if(Array.isArray(it)) {
                            for(let x of it) {
                                this.v[m[1]] = x;
                                this.exec(lines, i + 1, j, ind + 4);
                            }
                        }
                        i = j - 1;
                    }
                }
                // IF
                else if(t.startsWith('if ') && t.endsWith(':')) {
                    const cond = t.slice(3, -1);
                    let j = i + 1;
                    while(j < end && lines[j].search(/\S/) > ind) j++;
                    
                    if(this.isTruthy(this.ev(cond))) {
                        this.exec(lines, i + 1, j, ind + 4);
                    }
                    i = j - 1;
                }
            } catch(e) {}
        }
    }

    ev(e) {
        try {
            e = String(e).trim();

            // STRING
            if((e[0] === '"' && e[e.length-1] === '"') || (e[0] === "'" && e[e.length-1] === "'")) {
                return e.slice(1, -1);
            }

            // F-STRING
            if(e.startsWith('f"') || e.startsWith("f'")) {
                let r = e.slice(2, -1);
                r = r.replace(/\{([^}]+)\}/g, (m, v) => this.ev(v));
                return r;
            }

            // RANGE
            if(e.startsWith('range(')) {
                const args = e.slice(6, -1).split(',').map(x => Number(x.trim()));
                if(args.length === 1) return Array.from({length: args[0]}, (_, i) => i);
                if(args.length === 2) return Array.from({length: args[1] - args[0]}, (_, i) => i + args[0]);
            }

            // LEN
            if(e.startsWith('len(')) {
                const val = this.ev(e.slice(4, -1));
                return val.length || 0;
            }

            // SUM
            if(e.startsWith('sum(')) {
                const val = this.ev(e.slice(4, -1));
                if(Array.isArray(val)) return val.reduce((a, b) => a + b, 0);
            }

            // LIST
            if(e.startsWith('[') && e.endsWith(']')) {
                const c = e.slice(1, -1);
                if(!c) return [];
                return c.split(',').map(x => this.ev(x.trim()));
            }

            // VARIABLE
            if(this.v[e] !== undefined) return this.v[e];

            // NUMBER
            if(!isNaN(e) && e !== '') return Number(e);

            // EXPRESSION
            let expr = e.replace(/([a-zA-Z_]\w*)/g, m => {
                if(this.v[m] !== undefined) {
                    const val = this.v[m];
                    return typeof val === 'string' ? `"${val}"` : val;
                }
                return m;
            });

            return eval(expr);
        } catch(e) {
            return e;
        }
    }

    isTruthy(v) {
        return v !== false && v !== 0 && v !== '' && v !== null && v !== undefined;
    }
}

const code = document.getElementById('code');
const hl = document.getElementById('hl');
const out = document.getElementById('out');

function updateHL() {
    try {
        hl.innerHTML = hljs.highlight(code.value, {language:'python'}).value;
    } catch(e) {
        hl.textContent = code.value;
    }
}

code.addEventListener('scroll', () => { hl.scrollTop = code.scrollTop; hl.scrollLeft = code.scrollLeft; });
code.addEventListener('input', () => { updateHL(); localStorage.setItem('code', code.value); });

// TEMPLATES - Only programs that WORK
const templates = {
    'Hello World': {
        desc: 'Your first program - print text',
        code: `print("Hello, World!")
print("Welcome to Python!")`
    },
    'Numbers 1-5': {
        desc: 'Print numbers 1 to 5 using loop',
        code: `for i in range(1, 6):
    print(i)`
    },
    'Sum Numbers': {
        desc: 'Calculate sum of numbers',
        code: `numbers = [10, 20, 30, 40, 50]
total = sum(numbers)
print(f"Sum: {total}")`
    },
    'Count to 10': {
        desc: 'Loop from 1 to 10',
        code: `for i in range(1, 11):
    print(i)`
    },
    'Multiplication': {
        desc: 'Multiply two numbers',
        code: `x = 5
y = 7
result = x * y
print(f"{x} times {y} = {result}")`
    },
    'Grades': {
        desc: 'Check if grade is passing',
        code: `score = 85
if score >= 60:
    print("PASS")
else:
    print("FAIL")`
    },
    'List Loop': {
        desc: 'Print items from a list',
        code: `fruits = [1, 2, 3, 4, 5]
for fruit in fruits:
    print(fruit)`
    },
    'Even Numbers': {
        desc: 'Print only even numbers',
        code: `for i in range(1, 11):
    if i % 2 == 0:
        print(i)`
    },
    'Countdown': {
        desc: 'Count down from 5 to 1',
        code: `for i in range(5, 0, -1):
    print(i)
print("DONE")`
    },
    'Average': {
        desc: 'Calculate average of numbers',
        code: `scores = [80, 90, 70, 85, 95]
total = sum(scores)
avg = total / len(scores)
print(f"Average: {avg}")`
    },
    'If-Else': {
        desc: 'Check if number is positive',
        code: `num = 10
if num > 0:
    print("Positive")
else:
    print("Not positive")`
    },
    'Stars': {
        desc: 'Print stars in a row',
        code: `for i in range(1, 6):
    print("*" * i)`
    },
    'Times Table': {
        desc: 'Print multiplication table',
        code: `n = 5
for i in range(1, 6):
    print(f"{n} x {i} = {n*i}")`
    },
    'Length Check': {
        desc: 'Get length of a list',
        code: `items = [10, 20, 30, 40]
print(f"List: {items}")
print(f"Length: {len(items)}")`
    },
    'Double Numbers': {
        desc: 'Double each number in loop',
        code: `for i in range(1, 6):
    print(i * 2)`
    }
};

// COMMANDS WITH DESCRIPTIONS
const commands = [
    { cmd: 'print()', desc: 'Print text or numbers' },
    { cmd: 'for', desc: 'Loop through items' },
    { cmd: 'if', desc: 'If condition is true' },
    { cmd: 'else', desc: 'Else condition false' },
    { cmd: 'elif', desc: 'Else if another condition' },
    { cmd: 'range()', desc: 'Create list of numbers' },
    { cmd: 'len()', desc: 'Length of list or text' },
    { cmd: 'sum()', desc: 'Add all numbers' },
    { cmd: 'f"text {var}"', desc: 'Format string with value' },
    { cmd: 'x = 5', desc: 'Assign value to variable' },
    { cmd: '[1, 2, 3]', desc: 'Create a list' },
    { cmd: 'x + y', desc: 'Add two numbers' },
    { cmd: 'x - y', desc: 'Subtract two numbers' },
    { cmd: 'x * y', desc: 'Multiply two numbers' },
    { cmd: 'x / y', desc: 'Divide two numbers' },
    { cmd: 'x % y', desc: 'Modulo (remainder)' },
    { cmd: 'x == y', desc: 'Equal to' },
    { cmd: 'x > y', desc: 'Greater than' },
    { cmd: 'x < y', desc: 'Less than' },
    { cmd: 'x >= y', desc: 'Greater or equal' },
    { cmd: 'x <= y', desc: 'Less or equal' },
    { cmd: 'x != y', desc: 'Not equal to' },
    { cmd: 'and', desc: 'Both must be true' },
    { cmd: 'or', desc: 'At least one true' },
    { cmd: 'not', desc: 'Reverse true/false' },
    { cmd: '.append()', desc: 'Add item to list' },
    { cmd: '.remove()', desc: 'Delete item from list' },
    { cmd: '.upper()', desc: 'Make text uppercase' },
    { cmd: '.lower()', desc: 'Make text lowercase' },
    { cmd: '.split()', desc: 'Split text into words' },
    { cmd: '.join()', desc: 'Combine list into text' },
    { cmd: '.replace()', desc: 'Replace text' },
    { cmd: '.strip()', desc: 'Remove spaces' },
    { cmd: '.count()', desc: 'Count occurrences' },
    { cmd: '.find()', desc: 'Find position of text' },
    { cmd: 'int()', desc: 'Convert to number' },
    { cmd: 'str()', desc: 'Convert to text' },
    { cmd: 'max()', desc: 'Find largest number' },
    { cmd: 'min()', desc: 'Find smallest number' },
    { cmd: 'type()', desc: 'Check data type' }
];

document.getElementById('runBtn').addEventListener('click', () => {
    const p = new Py();
    const r = p.run(code.value);
    if(r.ok) {
        out.innerHTML = r.out.length ? r.out.map(l => `<div class="output-line">${l}</div>`).join('') : '<div style="color:#10b981">✓ Program complete</div>';
    } else {
        out.innerHTML = '<div style="color:#ef4444">⚠ Error</div>';
    }
});

document.getElementById('downloadBtn').addEventListener('click', () => {
    const a = document.createElement('a');
    a.href = 'data:text/plain;charset=utf-8,' + encodeURIComponent(code.value);
    a.download = 'code.py';
    a.click();
});

document.getElementById('clearBtn').addEventListener('click', () => {
    out.innerHTML = 'Ready';
});

document.getElementById('tplBtn').addEventListener('click', () => {
    document.getElementById('tpl').classList.add('show');
    document.getElementById('cmd').classList.remove('show');
});

document.getElementById('cmdBtn').addEventListener('click', () => {
    document.getElementById('cmd').classList.add('show');
    document.getElementById('tpl').classList.remove('show');
});

document.getElementById('tplClose').addEventListener('click', () => {
    document.getElementById('tpl').classList.remove('show');
});

document.getElementById('cmdClose').addEventListener('click', () => {
    document.getElementById('cmd').classList.remove('show');
});

// Render Templates
const tplContent = document.getElementById('tplContent');
for(const [name, data] of Object.entries(templates)) {
    const div = document.createElement('div');
    div.className = 'item';
    div.innerHTML = `<div class="item-name">${name}</div><div class="item-desc">${data.desc}</div>`;
    div.addEventListener('click', () => {
        code.value = data.code;
        updateHL();
        localStorage.setItem('code', data.code);
        document.getElementById('tpl').classList.remove('show');
    });
    tplContent.appendChild(div);
}

// Render Commands
const cmdContent = document.getElementById('cmdContent');
for(const item of commands) {
    const div = document.createElement('div');
    div.className = 'item';
    div.innerHTML = `<div class="item-name">${item.cmd}</div><div class="item-desc">${item.desc}</div>`;
    div.addEventListener('click', () => {
        const p = code.selectionStart;
        code.value = code.value.slice(0, p) + item.cmd + code.value.slice(p);
        updateHL();
        localStorage.setItem('code', code.value);
        document.getElementById('cmd').classList.remove('show');
    });
    cmdContent.appendChild(div);
}

code.value = localStorage.getItem('code') || 'print("Hello, World!")';
updateHL();
</script>
</body>
</html>
