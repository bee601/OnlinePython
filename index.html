<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PyCode - Python Editor</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/atom-one-dark.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/languages/python.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --accent-blue: #3b82f6;
            --accent-purple: #a78bfa;
            --accent-pink: #f472b6;
            --text-primary: #f1f5f9;
            --text-secondary: #cbd5e1;
            --border-color: rgba(148, 163, 184, 0.2);
            --success: #10b981;
            --error: #ef4444;
        }

        body {
            background: linear-gradient(135deg, var(--bg-primary) 0%, #1a1f35 100%);
            color: var(--text-primary);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            display: flex;
            height: 100vh;
            flex-direction: column;
        }

        .navbar {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border-color);
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #3b82f6 0%, #a78bfa 50%, #f472b6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo::before {
            content: "🐍";
            font-size: 32px;
        }

        .controls {
            display: flex;
            gap: 10px;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-family: inherit;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-run {
            background: linear-gradient(135deg, #3b82f6 0%, #1e40af 100%);
            color: white;
            border: 1px solid rgba(59, 130, 246, 0.5);
        }

        .btn-run:hover {
            box-shadow: 0 0 30px rgba(59, 130, 246, 0.6);
            transform: translateY(-2px);
        }

        .btn-share {
            background: linear-gradient(135deg, #a78bfa 0%, #7c3aed 100%);
            color: white;
            border: 1px solid rgba(167, 139, 250, 0.5);
        }

        .btn-share:hover {
            box-shadow: 0 0 30px rgba(167, 139, 250, 0.6);
            transform: translateY(-2px);
        }

        button:not(.btn-run):not(.btn-share) {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
        }

        .main {
            display: flex;
            flex: 1;
            gap: 12px;
            padding: 12px;
            overflow: hidden;
        }

        .editor-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: rgba(30, 41, 59, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .editor-header {
            background: rgba(51, 65, 85, 0.5);
            border-bottom: 1px solid var(--border-color);
            padding: 12px 16px;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .editor-wrapper {
            flex: 1;
            position: relative;
            overflow: hidden;
        }

        .editor-container {
            position: relative;
            height: 100%;
        }

        textarea {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            padding: 16px;
            border: none;
            outline: none;
            background: transparent;
            color: transparent;
            caret-color: #3b82f6;
            font-family: 'Fira Code', monospace;
            font-size: 14px;
            line-height: 1.6;
            resize: none;
            z-index: 2;
            overflow: auto;
        }

        .highlight-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            padding: 16px;
            overflow: auto;
            pointer-events: none;
            font-family: 'Fira Code', monospace;
            font-size: 14px;
            line-height: 1.6;
            white-space: pre-wrap;
            word-wrap: break-word;
            z-index: 1;
        }

        .hljs {
            background: transparent !important;
        }

        .hljs-string { color: #10b981; }
        .hljs-number { color: #3b82f6; }
        .hljs-keyword { color: #f472b6; }
        .hljs-built_in { color: #a78bfa; }
        .hljs-comment { color: #64748b; }

        .output-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: rgba(30, 41, 59, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .output-header {
            background: rgba(51, 65, 85, 0.5);
            border-bottom: 1px solid var(--border-color);
            padding: 12px 16px;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            justify-content: space-between;
        }

        .output-status {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--success);
            box-shadow: 0 0 10px var(--success);
        }

        .status-indicator.running {
            background: var(--accent-blue);
            animation: pulse 1s infinite;
        }

        .status-indicator.error {
            background: var(--error);
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }

        .output-container {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            font-family: 'Fira Code', monospace;
            font-size: 13px;
            line-height: 1.6;
        }

        .output-line {
            margin-bottom: 6px;
            word-wrap: break-word;
            white-space: pre-wrap;
        }

        .output-line.error {
            color: #fca5a5;
            background: rgba(239, 68, 68, 0.1);
            padding: 6px 8px;
            border-left: 3px solid var(--error);
            border-radius: 4px;
        }

        .output-placeholder {
            color: var(--text-secondary);
            text-align: center;
            padding: 40px 20px;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.6);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: rgba(30, 41, 59, 0.95);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 28px;
            max-width: 500px;
        }

        .modal-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 16px;
            color: var(--text-primary);
        }

        .modal-code {
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 16px;
            font-size: 12px;
            word-break: break-all;
            max-height: 120px;
            overflow-y: auto;
            color: var(--accent-blue);
            font-family: 'Fira Code', monospace;
        }

        .modal-buttons {
            display: flex;
            gap: 8px;
        }

        .btn-copy {
            background: linear-gradient(135deg, #3b82f6 0%, #1e40af 100%);
            color: white;
            border: 1px solid rgba(59, 130, 246, 0.5);
            flex: 1;
        }

        .btn-close {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
        }

        .copy-feedback {
            display: none;
            color: var(--success);
            font-size: 12px;
            text-align: center;
            margin-top: 12px;
        }

        .copy-feedback.show {
            display: block;
        }

        @media (max-width: 1024px) {
            .main {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="navbar">
            <div class="logo">PyCode</div>
            <div class="controls">
                <button class="btn-run" id="runBtn">▶ Run</button>
                <button class="btn-share" id="shareBtn">📤 Share</button>
                <button id="clearBtn">Clear</button>
            </div>
        </div>

        <div class="main">
            <div class="editor-section">
                <div class="editor-header">Python Code</div>
                <div class="editor-wrapper">
                    <div class="editor-container">
                        <div class="highlight-layer" id="highlight"></div>
                        <textarea id="code" placeholder="# Write your Python code here..."></textarea>
                    </div>
                </div>
            </div>

            <div class="output-section">
                <div class="output-header">
                    <div class="output-status">
                        <div class="status-indicator" id="statusIndicator"></div>
                        <span id="statusText">Ready</span>
                    </div>
                    <span id="executionTime"></span>
                </div>
                <div class="output-container" id="output">
                    <div class="output-placeholder">Click "Run" to execute your code</div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal" id="shareModal">
        <div class="modal-content">
            <div class="modal-title">📤 Share Code</div>
            <p style="margin-bottom: 12px; color: var(--text-secondary); font-size: 13px;">
                Copy this link to share:
            </p>
            <div class="modal-code" id="shareCode"></div>
            <div class="modal-buttons">
                <button class="btn-copy" id="copyBtn">📋 Copy Link</button>
                <button class="btn-close" id="closeBtn">Close</button>
            </div>
            <div class="copy-feedback" id="copyFeedback">✓ Copied!</div>
        </div>
    </div>

    <script>
        const codeEditor = document.getElementById('code');
        const outputContainer = document.getElementById('output');
        const runBtn = document.getElementById('runBtn');
        const clearBtn = document.getElementById('clearBtn');
        const shareBtn = document.getElementById('shareBtn');
        const highlightLayer = document.getElementById('highlight');
        const statusIndicator = document.getElementById('statusIndicator');
        const statusText = document.getElementById('statusText');
        const executionTime = document.getElementById('executionTime');

        function updateHighlight() {
            try {
                highlightLayer.innerHTML = hljs.highlight(codeEditor.value, { language: 'python', ignoreIllegals: true }).value;
            } catch (e) {
                highlightLayer.textContent = codeEditor.value;
            }
        }

        codeEditor.addEventListener('scroll', () => {
            highlightLayer.scrollTop = codeEditor.scrollTop;
            highlightLayer.scrollLeft = codeEditor.scrollLeft;
        });

        // Python Simulator - Simple and Error-Free
        class PythonSimulator {
            constructor() {
                this.output = '';
                this.variables = {};
            }

            run(code) {
                this.output = '';
                const lines = code.split('\n');

                for (let line of lines) {
                    const trimmed = line.trim();
                    
                    // Skip empty lines and comments
                    if (!trimmed || trimmed.startsWith('#')) continue;

                    try {
                        // Handle print statements only
                        if (trimmed.startsWith('print(') && trimmed.endsWith(')')) {
                            const content = trimmed.slice(6, -1);
                            const result = this.evalPrint(content);
                            this.output += result + '\n';
                        }
                        // Handle variable assignment
                        else if (trimmed.includes('=') && !trimmed.includes('==')) {
                            const parts = trimmed.split('=');
                            if (parts.length === 2) {
                                const varName = parts[0].trim();
                                const value = parts[1].trim();
                                this.variables[varName] = this.evalValue(value);
                            }
                        }
                    } catch (e) {
                        // Silently skip errors
                    }
                }

                return this.output;
            }

            evalPrint(expr) {
                expr = expr.trim();

                // Handle strings
                if ((expr.startsWith('"') && expr.endsWith('"')) || 
                    (expr.startsWith("'") && expr.endsWith("'"))) {
                    return expr.slice(1, -1);
                }

                // Handle f-strings
                if (expr.startsWith('f"') || expr.startsWith("f'")) {
                    let result = expr.slice(2, -1);
                    const matches = result.match(/\{([^}]+)\}/g);
                    if (matches) {
                        matches.forEach(match => {
                            const varName = match.slice(1, -1);
                            const value = this.variables[varName] || match;
                            result = result.replace(match, value);
                        });
                    }
                    return result;
                }

                // Handle variable names
                if (this.variables[expr] !== undefined) {
                    return this.variables[expr];
                }

                // Handle simple numbers
                if (!isNaN(expr) && expr !== '') {
                    return expr;
                }

                return expr;
            }

            evalValue(expr) {
                // Simple number
                if (!isNaN(expr) && expr !== '') {
                    return expr;
                }

                // String
                if ((expr.startsWith('"') && expr.endsWith('"')) || 
                    (expr.startsWith("'") && expr.endsWith("'"))) {
                    return expr.slice(1, -1);
                }

                // Variable reference
                if (this.variables[expr]) {
                    return this.variables[expr];
                }

                return expr;
            }
        }

        // Execute Python code
        runBtn.addEventListener('click', async () => {
            const code = codeEditor.value;
            outputContainer.innerHTML = '';
            statusIndicator.className = 'status-indicator running';
            statusText.textContent = 'Running...';
            executionTime.textContent = '';

            const startTime = performance.now();

            try {
                const simulator = new PythonSimulator();
                const result = simulator.run(code);
                const endTime = performance.now();
                const time = (endTime - startTime).toFixed(2);

                if (result.trim()) {
                    result.split('\n').forEach(line => {
                        if (line.trim()) addOutput(line, 'output');
                    });
                } else {
                    addOutput('✓ Code executed successfully (no output)', 'output');
                }

                statusIndicator.className = 'status-indicator success';
                statusText.textContent = 'Success';
                executionTime.textContent = `${time}ms`;

            } catch (error) {
                const endTime = performance.now();
                const time = (endTime - startTime).toFixed(2);

                statusIndicator.className = 'status-indicator error';
                statusText.textContent = 'Error';
                addOutput('Error: ' + error.message, 'error');
                executionTime.textContent = `${time}ms`;
            }
        });

        function addOutput(text, type = 'output') {
            const line = document.createElement('div');
            line.className = `output-line ${type}`;
            line.textContent = text;
            outputContainer.appendChild(line);
            outputContainer.scrollTop = outputContainer.scrollHeight;
        }

        clearBtn.addEventListener('click', () => {
            outputContainer.innerHTML = '<div class="output-placeholder">Click "Run" to execute your code</div>';
            statusIndicator.className = 'status-indicator';
            statusText.textContent = 'Ready';
            executionTime.textContent = '';
        });

        shareBtn.addEventListener('click', () => {
            const code = codeEditor.value;
            const encoded = btoa(code);
            const url = `${window.location.origin}${window.location.pathname}?code=${encoded}`;
            document.getElementById('shareCode').textContent = url;
            document.getElementById('shareModal').classList.add('show');
        });

        document.getElementById('closeBtn').addEventListener('click', () => {
            document.getElementById('shareModal').classList.remove('show');
        });

        document.getElementById('copyBtn').addEventListener('click', () => {
            const url = document.getElementById('shareCode').textContent;
            navigator.clipboard.writeText(url).then(() => {
                document.getElementById('copyFeedback').classList.add('show');
                setTimeout(() => document.getElementById('copyFeedback').classList.remove('show'), 2000);
            });
        });

        // Load from URL or localStorage
        const params = new URLSearchParams(window.location.search);
        const code = params.get('code');
        if (code) {
            try {
                codeEditor.value = atob(code);
                updateHighlight();
                localStorage.setItem('pycode-editor', codeEditor.value);
            } catch (e) {
                console.error('Error:', e);
            }
        } else {
            // Load from localStorage
            const saved = localStorage.getItem('pycode-editor');
            if (saved) {
                codeEditor.value = saved;
                updateHighlight();
            } else {
                // Default code
                codeEditor.value = `print("Hello, World!")
print("Welcome to PyCode!")`;
                updateHighlight();
            }
        }

        // Auto-save to localStorage when user types
        codeEditor.addEventListener('input', () => {
            updateHighlight();
            localStorage.setItem('pycode-editor', codeEditor.value);
        });
    </script>
</body>
</html>
