<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PyCode - Python Editor</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/atom-one-dark.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/languages/python.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/pyodide@0.23.4/pyodide.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #00d4ff;
            --secondary: #ff006e;
            --bg-dark: #0a0e27;
            --bg-lighter: #1a1f3a;
            --text-primary: #e0e6ff;
            --text-secondary: #8892b0;
            --border: #2a3550;
            --success: #00ff88;
            --error: #ff4757;
        }

        html, body {
            height: 100%;
            background: var(--bg-dark);
            color: var(--text-primary);
            font-family: 'Fira Code', 'Courier New', monospace;
            overflow: hidden;
        }

        body {
            background: linear-gradient(135deg, var(--bg-dark) 0%, #0f1634 100%);
        }

        .container {
            display: flex;
            height: 100vh;
            gap: 0;
        }

        .editor-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--border);
            position: relative;
            overflow: hidden;
        }

        .output-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            padding: 20px;
            background: rgba(10, 14, 39, 0.8);
            border-bottom: 1px solid var(--border);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -1px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo::before {
            content: "🐍";
            font-size: 28px;
            filter: drop-shadow(0 0 8px rgba(0, 212, 255, 0.4));
        }

        .controls {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        button {
            padding: 10px 18px;
            border: none;
            border-radius: 6px;
            font-family: inherit;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn-run {
            background: linear-gradient(135deg, var(--primary), #00b8d4));
            color: var(--bg-dark);
            box-shadow: 0 4px 12px rgba(0, 212, 255, 0.3);
        }

        .btn-run:hover {
            box-shadow: 0 6px 20px rgba(0, 212, 255, 0.5);
            transform: translateY(-2px);
        }

        .btn-run:active {
            transform: translateY(0);
        }

        .btn-clear {
            background: var(--bg-lighter);
            color: var(--text-secondary);
            border: 1px solid var(--border);
        }

        .btn-clear:hover {
            background: var(--border);
            color: var(--text-primary);
        }

        .btn-share {
            background: var(--secondary);
            color: #fff;
            box-shadow: 0 4px 12px rgba(255, 0, 110, 0.3);
        }

        .btn-share:hover {
            box-shadow: 0 6px 20px rgba(255, 0, 110, 0.5);
            transform: translateY(-2px);
        }

        .editor-container {
            flex: 1;
            display: flex;
            overflow: hidden;
            position: relative;
        }

        textarea {
            flex: 1;
            background: transparent;
            color: var(--text-primary);
            border: none;
            padding: 20px;
            font-family: 'Fira Code', monospace;
            font-size: 14px;
            line-height: 1.6;
            resize: none;
            outline: none;
            z-index: 2;
            position: relative;
        }

        .highlight-layer {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            padding: 20px;
            pointer-events: none;
            overflow: hidden;
            font-family: 'Fira Code', monospace;
            font-size: 14px;
            line-height: 1.6;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .hljs {
            background: transparent !important;
            color: var(--text-primary) !important;
        }

        .hljs-string {
            color: #00ff88;
        }

        .hljs-number {
            color: var(--primary);
        }

        .hljs-literal {
            color: var(--primary);
        }

        .hljs-attr {
            color: #00ff88;
        }

        .hljs-keyword {
            color: var(--secondary);
        }

        .hljs-built_in {
            color: #ff9f43;
        }

        .output-header {
            padding: 15px 20px;
            background: rgba(10, 14, 39, 0.6);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-secondary);
        }

        .output-status {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--text-secondary);
            animation: pulse 2s ease-in-out infinite;
        }

        .status-indicator.running {
            background: var(--primary);
            box-shadow: 0 0 8px var(--primary);
        }

        .status-indicator.success {
            background: var(--success);
            box-shadow: 0 0 8px var(--success);
            animation: none;
        }

        .status-indicator.error {
            background: var(--error);
            box-shadow: 0 0 8px var(--error);
            animation: none;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        .output-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            font-size: 13px;
            line-height: 1.6;
        }

        .output-line {
            margin-bottom: 8px;
            font-family: 'Fira Code', monospace;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-5px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .output-line.output {
            color: var(--text-primary);
        }

        .output-line.error {
            color: var(--error);
            background: rgba(255, 71, 87, 0.1);
            padding: 4px 8px;
            border-left: 3px solid var(--error);
            margin-left: -8px;
            padding-left: 8px;
        }

        .output-line.success {
            color: var(--success);
        }

        .output-placeholder {
            color: var(--text-secondary);
            font-style: italic;
            text-align: center;
            padding: 40px 20px;
            user-select: none;
        }

        .scrollbar-track {
            width: 8px;
        }

        .output-container::-webkit-scrollbar {
            width: 8px;
        }

        .output-container::-webkit-scrollbar-track {
            background: transparent;
        }

        .output-container::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }

        .output-container::-webkit-scrollbar-thumb:hover {
            background: var(--text-secondary);
        }

        textarea::-webkit-scrollbar {
            width: 8px;
        }

        textarea::-webkit-scrollbar-track {
            background: transparent;
        }

        textarea::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }

        textarea::-webkit-scrollbar-thumb:hover {
            background: var(--text-secondary);
        }

        @media (max-width: 1024px) {
            .container {
                flex-direction: column;
            }

            .editor-panel {
                border-right: none;
                border-bottom: 1px solid var(--border);
            }

            .header {
                flex-wrap: wrap;
            }
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(4px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: var(--bg-lighter);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 30px;
            max-width: 500px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            animation: modalSlide 0.3s ease;
        }

        @keyframes modalSlide {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .modal-title {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 15px;
            color: var(--primary);
        }

        .modal-code {
            background: var(--bg-dark);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 15px;
            margin-bottom: 15px;
            font-size: 12px;
            word-break: break-all;
            max-height: 200px;
            overflow-y: auto;
            color: var(--text-secondary);
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        .btn-copy {
            flex: 1;
            background: var(--primary);
            color: var(--bg-dark);
        }

        .btn-copy:hover {
            opacity: 0.9;
        }

        .btn-close {
            background: var(--bg-dark);
            border: 1px solid var(--border);
            color: var(--text-secondary);
        }

        .btn-close:hover {
            border-color: var(--text-primary);
            color: var(--text-primary);
        }

        .copy-feedback {
            display: none;
            color: var(--success);
            font-size: 12px;
            text-align: center;
            margin-top: 10px;
        }

        .copy-feedback.show {
            display: block;
            animation: fadeInOut 2s ease;
        }

        @keyframes fadeInOut {
            0%, 100% { opacity: 0; }
            50% { opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Editor Panel -->
        <div class="editor-panel">
            <div class="header">
                <div class="logo">PyCode</div>
                <div class="controls">
                    <button class="btn-run" id="runBtn">▶ Run</button>
                    <button class="btn-clear" id="clearBtn">Clear</button>
                    <button class="btn-share" id="shareBtn">⚡ Share</button>
                </div>
            </div>
            <div class="editor-container">
                <div class="highlight-layer" id="highlight"></div>
                <textarea id="code" spellcheck="false" placeholder="# Write your Python code here..."></textarea>
            </div>
        </div>

        <!-- Output Panel -->
        <div class="output-panel">
            <div class="output-header">
                <div class="output-status">
                    <div class="status-indicator" id="statusIndicator"></div>
                    <span id="statusText">Ready</span>
                </div>
                <span id="executionTime"></span>
            </div>
            <div class="output-container" id="output">
                <div class="output-placeholder">Click "Run" to execute your code</div>
            </div>
        </div>
    </div>

    <!-- Share Modal -->
    <div class="modal" id="shareModal">
        <div class="modal-content">
            <div class="modal-title">📤 Share Code</div>
            <p style="margin-bottom: 15px; color: var(--text-secondary); font-size: 13px;">
                Copy this link to share your code:
            </p>
            <div class="modal-code" id="shareCode"></div>
            <div class="modal-buttons">
                <button class="btn-copy" id="copyBtn">📋 Copy Link</button>
                <button class="btn-close" id="closeBtn">Close</button>
            </div>
            <div class="copy-feedback" id="copyFeedback">✓ Link kopiert!</div>
        </div>
    </div>

    <script>
        let pyodideReady = false;
        let pyodide = null;

        async function initPyodide() {
            try {
                pyodide = await loadPyodide();
                pyodideReady = true;
                console.log("Pyodide initialized");
            } catch (error) {
                console.error("Error initializing Pyodide:", error);
            }
        }

        const codeEditor = document.getElementById('code');
        const outputContainer = document.getElementById('output');
        const runBtn = document.getElementById('runBtn');
        const clearBtn = document.getElementById('clearBtn');
        const shareBtn = document.getElementById('shareBtn');
        const highlightLayer = document.getElementById('highlight');
        const statusIndicator = document.getElementById('statusIndicator');
        const statusText = document.getElementById('statusText');
        const executionTime = document.getElementById('executionTime');
        const shareModal = document.getElementById('shareModal');
        const shareCode = document.getElementById('shareCode');
        const copyBtn = document.getElementById('copyBtn');
        const closeBtn = document.getElementById('closeBtn');
        const copyFeedback = document.getElementById('copyFeedback');

        // Load code from URL if shared
        function loadFromURL() {
            const params = new URLSearchParams(window.location.search);
            const code = params.get('code');
            if (code) {
                try {
                    const decoded = atob(code);
                    codeEditor.value = decoded;
                    updateHighlight();
                } catch (e) {
                    console.error('Error decoding shared code:', e);
                }
            }
        }

        // Update syntax highlighting
        function updateHighlight() {
            const code = codeEditor.value;
            highlightLayer.innerHTML = hljs.highlight(code, { language: 'python', ignoreIllegals: true }).value;
        }

        // Sync scroll
        codeEditor.addEventListener('scroll', () => {
            highlightLayer.scrollTop = codeEditor.scrollTop;
            highlightLayer.scrollLeft = codeEditor.scrollLeft;
        });

        codeEditor.addEventListener('input', updateHighlight);

        // Run code
        runBtn.addEventListener('click', async () => {
            if (!pyodideReady) {
                addOutput('⏳ Loading Python...', 'error');
                return;
            }

            statusIndicator.className = 'status-indicator running';
            statusText.textContent = 'Running...';
            executionTime.textContent = '';
            
            const code = codeEditor.value;
            outputContainer.innerHTML = '';

            // Capture stdout
            const stdout = [];
            const stderr = [];

            try {
                const startTime = performance.now();

                // Redirect stdout
                await pyodide.runPythonAsync(`
import sys
from io import StringIO

class OutputCapture:
    def __init__(self):
        self.buffer = []
    
    def write(self, text):
        self.buffer.append(text)
    
    def flush(self):
        pass

capture = OutputCapture()
sys.stdout = capture
sys.stderr = capture
`);

                // Execute user code
                await pyodide.runPythonAsync(code);

                // Get captured output
                const result = await pyodide.runPythonAsync(`''.join(capture.buffer)`);
                
                const endTime = performance.now();
                const time = (endTime - startTime).toFixed(2);

                // Display output
                if (result) {
                    result.split('\n').forEach(line => {
                        if (line) addOutput(line, 'output');
                    });
                }

                statusIndicator.className = 'status-indicator success';
                statusText.textContent = 'Success';
                executionTime.textContent = `${time}ms`;

            } catch (error) {
                statusIndicator.className = 'status-indicator error';
                statusText.textContent = 'Error';
                addOutput(String(error), 'error');
            }
        });

        function addOutput(text, type = 'output') {
            const line = document.createElement('div');
            line.className = `output-line ${type}`;
            line.textContent = text;
            outputContainer.appendChild(line);
            outputContainer.scrollTop = outputContainer.scrollHeight;
        }

        clearBtn.addEventListener('click', () => {
            outputContainer.innerHTML = '<div class="output-placeholder">Click "Run" to execute your code</div>';
            statusIndicator.className = 'status-indicator';
            statusText.textContent = 'Ready';
            executionTime.textContent = '';
        });

        shareBtn.addEventListener('click', () => {
            const code = codeEditor.value;
            const encoded = btoa(code);
            const url = `${window.location.origin}${window.location.pathname}?code=${encoded}`;
            shareCode.textContent = url;
            shareModal.classList.add('show');
        });

        closeBtn.addEventListener('click', () => {
            shareModal.classList.remove('show');
            copyFeedback.classList.remove('show');
        });

        copyBtn.addEventListener('click', () => {
            const url = shareCode.textContent;
            navigator.clipboard.writeText(url).then(() => {
                copyFeedback.classList.add('show');
                setTimeout(() => copyFeedback.classList.remove('show'), 2000);
            });
        });

        shareModal.addEventListener('click', (e) => {
            if (e.target === shareModal) {
                shareModal.classList.remove('show');
            }
        });

        // Initialize
        loadFromURL();
        initPyodide();

        // Default example code
        if (!codeEditor.value) {
            codeEditor.value = `# Python Editor - Write your code here!
print("🐍 Welcome to PyCode!")

# Example:
numbers = [1, 2, 3, 4, 5]
squares = [x**2 for x in numbers]
print(f"Squares: {squares}")

# More Python:
def greet(name):
    return f"Hello, {name}! 👋"

print(greet("Developer"))`;
            updateHighlight();
        }
    </script>
</body>
</html>
