<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PyCode Pro - Full Editor</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/atom-one-dark.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/languages/python.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0f172a; color: #f1f5f9; font-family: 'Inter', sans-serif; height: 100vh; overflow: hidden; }
        .container { display: flex; flex-direction: column; height: 100vh; }
        .navbar { background: rgba(15, 23, 42, 0.95); padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #334155; }
        .logo { font-size: 24px; font-weight: 800; background: linear-gradient(135deg, #3b82f6, #a78bfa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        button { padding: 8px 16px; border: 1px solid #334155; border-radius: 6px; background: #1e293b; color: white; cursor: pointer; font-size: 13px; font-weight: 600; }
        .btn-run { background: #2563eb; border: none; }
        .main { display: flex; flex: 1; padding: 12px; gap: 12px; overflow: hidden; }
        .panel { flex: 1; display: flex; flex-direction: column; background: #1e293b; border-radius: 8px; overflow: hidden; border: 1px solid #334155; }
        .panel-header { background: #334155; padding: 8px 16px; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: #cbd5e1; }
        .editor-wrapper { flex: 1; position: relative; }
        textarea, .highlight-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; padding: 16px; font-family: 'Fira Code', monospace; font-size: 14px; line-height: 1.6; border: none; background: transparent; color: transparent; caret-color: white; resize: none; z-index: 2; overflow: auto; }
        .highlight-layer { z-index: 1; pointer-events: none; color: #f1f5f9; white-space: pre-wrap; }
        .output-container { padding: 16px; font-family: 'Fira Code', monospace; font-size: 13px; color: #e2e8f0; overflow-y: auto; }
        /* Autocomplete Style */
        .autocomplete-dropdown { position: absolute; background: #111827; border: 1px solid #3b82f6; border-radius: 6px; z-index: 1000; max-height: 200px; overflow-y: auto; display: none; width: 200px; }
        .autocomplete-dropdown.show { display: block; }
        .autocomplete-item { padding: 8px 12px; cursor: pointer; color: #60a5fa; font-family: 'Fira Code', monospace; }
        .autocomplete-item:hover { background: #1e293b; }
    </style>
</head>
<body>
<div class="container">
    <div class="navbar">
        <div class="logo">PyCode Pro</div>
        <div>
            <button class="btn-run" id="run">Run</button>
            <button id="clear">Clear</button>
        </div>
    </div>
    <div class="main">
        <div class="panel">
            <div class="panel-header">Python Editor</div>
            <div class="editor-wrapper">
                <div class="highlight-layer" id="hl"></div>
                <textarea id="code" spellcheck="false" autocomplete="off"></textarea>
            </div>
        </div>
        <div class="panel">
            <div class="panel-header">Output</div>
            <div class="output-container" id="out">Ready to run...</div>
        </div>
    </div>
</div>
<div class="autocomplete-dropdown" id="ac"></div>

<script>
    const code = document.getElementById('code');
    const hl = document.getElementById('hl');
    const out = document.getElementById('out');
    const ac = document.getElementById('ac');
    const cmds = ['print()','input()','for i in range():','while True:','if:','elif:','else:','def():','return','import','len()','list()','dict()','str()','int()','append()','pop()','split()'];

    function updateHL() {
        try { hl.innerHTML = hljs.highlight(code.value, {language:'python'}).value; } 
        catch(e) { hl.textContent = code.value; }
    }

    function showAC() {
        const t = code.value;
        const p = code.selectionStart;
        let s = p;
        while(s > 0 && /[a-zA-Z0-9_()]/.test(t[s-1])) s--;
        const w = t.substring(s, p);
        
        if(!w) { ac.classList.remove('show'); return; }
        const matches = cmds.filter(c => c.toLowerCase().includes(w.toLowerCase()));
        
        if(matches.length === 0) { ac.classList.remove('show'); return; }
        
        ac.innerHTML = matches.map(c => `<div class="autocomplete-item">${c}</div>`).join('');
        ac.style.display = 'block';
        ac.classList.add('show');
        
        document.querySelectorAll('.autocomplete-item').forEach(el => {
            el.onclick = () => {
                const cmd = el.textContent;
                code.value = t.slice(0, s) + cmd + t.slice(p);
                ac.classList.remove('show');
                updateHL();
                code.focus();
            };
        });
    }

    code.oninput = () => { updateHL(); showAC(); localStorage.setItem('code', code.value); };
    code.onscroll = () => { hl.scrollTop = code.scrollTop; hl.scrollLeft = code.scrollLeft; };
    
    // Simple Python Execution Engine
    class Py {
        constructor() { this.o = []; }
        run(c) {
            try {
                const logs = [];
                const print = (...args) => logs.push(args.join(' '));
                const func = new Function('print', c);
                func(print);
                return logs.join('\n');
            } catch(e) { return "Error: " + e.message; }
        }
    }

    document.getElementById('run').onclick = () => {
        const p = new Py();
        out.textContent = p.run(code.value) || "Code executed successfully.";
    };

    document.getElementById('clear').onclick = () => out.textContent = "Ready to run...";
    
    code.value = localStorage.getItem('code') || 'print("Hello, World!")';
    updateHL();
</script>
</body>
</html>
